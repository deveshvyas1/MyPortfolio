  <text x="115" y="575" fill="#22C55E" font-family="Inter, Arial, sans-serif" font-size="18">Automation coverage includes smoke + regression flows</text>

  <text x="825" y="210" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22">QA Metrics</text>
